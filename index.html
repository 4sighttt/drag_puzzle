<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Puzzle</title>
<style>
html,body{
  margin:0;
  height:100%;
  background:#111;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  overflow:hidden;
  user-select:none;
  -webkit-user-select:none;
  touch-action:none;
}
#wrapper{
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:10px;
}
#board{
  position:relative;
  background:#000;
}
#preview{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  display:none;
  object-fit:cover;
  pointer-events:none;
}
.piece{
  position:absolute;
  box-sizing:border-box;
  border:1px solid rgba(255,255,255,0.25);
  background-repeat:no-repeat;
  cursor:grab;
  touch-action:none;
}
.piece.dragging{
  cursor:grabbing;
  z-index:10;
}

/* --- Controls --- */
#controls{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:8px;
  max-width:90vw;
}
#controls button, #controls label{
  background:rgba(255,255,255,0.08);
  color:#ccc;
  border:1px solid rgba(255,255,255,0.15);
  border-radius:6px;
  padding:8px 14px;
  font-size:14px;
  font-family:system-ui,sans-serif;
  cursor:pointer;
  transition:background 0.15s, border-color 0.15s;
  -webkit-tap-highlight-color:transparent;
}
#controls button:active, #controls label:active{
  background:rgba(255,255,255,0.18);
  border-color:rgba(255,255,255,0.35);
}
#controls button.active{
  background:rgba(255,255,255,0.18);
  border-color:rgba(255,255,255,0.4);
  color:#fff;
}
#fileInput{
  display:none;
}

/* Grid selector */
#gridSelect{
  display:flex;
  gap:4px;
  align-items:center;
}
#gridSelect button{
  min-width:36px;
  padding:8px 10px;
  text-align:center;
}
#gridSelect button.selected{
  background:rgba(255,255,255,0.22);
  border-color:rgba(255,255,255,0.5);
  color:#fff;
}

/* Instruction overlay */
#instruction{
  position:absolute;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  pointer-events:none;
  color:rgba(255,255,255,0.25);
  font-size:16px;
  font-family:system-ui,sans-serif;
  text-align:center;
  padding:20px;
}
</style>
</head>
<body>

<div id="wrapper">
  <div id="board">
    <img id="preview" alt="">
    <div id="instruction">이미지를 업로드하세요</div>
  </div>

  <div id="controls">
    <label for="fileInput">📷 이미지</label>
    <input type="file" id="fileInput" accept="image/*">

    <div id="gridSelect">
      <button data-grid="3">3</button>
      <button data-grid="4" class="selected">4</button>
      <button data-grid="5">5</button>
      <button data-grid="6">6</button>
      <button data-grid="7">7</button>
    </div>

    <button id="btnPreview">👁 원본</button>
    <button id="btnShuffle">🔀 섞기</button>
    <button id="btnHint">💡 힌트</button>
  </div>
</div>

<script>
const board = document.getElementById("board");
const preview = document.getElementById("preview");
const instruction = document.getElementById("instruction");
const fileInput = document.getElementById("fileInput");
const btnPreview = document.getElementById("btnPreview");
const btnShuffle = document.getElementById("btnShuffle");
const btnHint = document.getElementById("btnHint");
const gridButtons = document.querySelectorAll("#gridSelect button");

let gridSize = 4;
let pieces = [];
let cellSize = 0;
let boardSize = 0;
let pendingImageSrc = null;
let originalImg = null; // keep original Image object for re-crop on resize

let hintTimer = null;
const HINT_INTERVAL_MS = 3000;

function computeBoardSize(){
  const vw = window.innerWidth;
  const vh = window.innerHeight;
  const controlsHeight = 60;
  const availH = vh - controlsHeight - 30;
  const vmin = Math.min(vw * 0.92, availH);
  boardSize = Math.min(900, Math.floor(vmin));
  boardSize = Math.floor(boardSize / gridSize) * gridSize;
  board.style.width = boardSize + "px";
  board.style.height = boardSize + "px";
  cellSize = boardSize / gridSize;
}

function shuffle(arr){
  for(let i=arr.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [arr[i],arr[j]]=[arr[j],arr[i]];
  }
}

function centerCropToBoard(img){
  const size = Math.min(img.width, img.height);
  const sx = (img.width - size) / 2;
  const sy = (img.height - size) / 2;
  const c = document.createElement("canvas");
  c.width = boardSize;
  c.height = boardSize;
  const ctx = c.getContext("2d");
  ctx.drawImage(img, sx, sy, size, size, 0, 0, boardSize, boardSize);
  return c.toDataURL();
}

function clearBoardPieces(){
  stopAutoHint();
  pieces = [];
  [...board.querySelectorAll(".piece")].forEach(el => el.remove());
}

function showPreview(src){
  preview.src = src;
  preview.style.display = "block";
}
function hidePreview(){
  preview.style.display = "none";
}

function hideInstruction(){
  instruction.style.display = "none";
}

function initPuzzle(src){
  computeBoardSize();
  clearBoardPieces();
  hidePreview();
  hideInstruction();

  const total = gridSize * gridSize;
  const positions = [...Array(total).keys()];
  shuffle(positions);

  let solved = true;
  for(let i=0;i<positions.length;i++){
    if(positions[i] !== i){ solved = false; break; }
  }
  if(solved) shuffle(positions);

  positions.forEach((pos,i)=>{
    const piece = document.createElement("div");
    piece.className = "piece";

    const correctRow = Math.floor(i / gridSize);
    const correctCol = i % gridSize;
    const row = Math.floor(pos / gridSize);
    const col = pos % gridSize;

    piece.style.width = cellSize + "px";
    piece.style.height = cellSize + "px";
    piece.style.left = col * cellSize + "px";
    piece.style.top = row * cellSize + "px";

    piece.style.backgroundImage = `url(${src})`;
    piece.style.backgroundSize = boardSize + "px " + boardSize + "px";
    piece.style.backgroundPosition = `-${correctCol * cellSize}px -${correctRow * cellSize}px`;

    piece.dataset.correct = i;
    piece.dataset.cell = pos;

    board.appendChild(piece);
    pieces.push(piece);
    enableDrag(piece);
  });
}

function getNearestCell(clientX, clientY){
  const rect = board.getBoundingClientRect();
  const col = Math.min(gridSize - 1, Math.max(0, Math.floor((clientX - rect.left) / cellSize)));
  const row = Math.min(gridSize - 1, Math.max(0, Math.floor((clientY - rect.top) / cellSize)));
  return row * gridSize + col;
}

function movePieceToCell(piece, cell){
  const row = Math.floor(cell / gridSize);
  const col = cell % gridSize;
  piece.style.left = col * cellSize + "px";
  piece.style.top = row * cellSize + "px";
  piece.dataset.cell = cell;
}

function enableDrag(piece){
  let offsetX = 0, offsetY = 0;
  let dragging = false;

  function onStart(cx, cy){
    dragging = true;
    piece.classList.add("dragging");
    const rect = piece.getBoundingClientRect();
    offsetX = cx - rect.left;
    offsetY = cy - rect.top;
  }

  function onMove(cx, cy){
    if(!dragging) return;
    const rect = board.getBoundingClientRect();
    let x = cx - rect.left - offsetX;
    let y = cy - rect.top - offsetY;
    x = Math.max(0, Math.min(rect.width - cellSize, x));
    y = Math.max(0, Math.min(rect.height - cellSize, y));
    piece.style.left = x + "px";
    piece.style.top = y + "px";
  }

  function onEnd(cx, cy){
    if(!dragging) return;
    dragging = false;
    piece.classList.remove("dragging");

    const targetCell = getNearestCell(cx, cy);
    const currentCell = parseInt(piece.dataset.cell, 10);
    const other = pieces.find(p => parseInt(p.dataset.cell, 10) === targetCell);

    if(other && other !== piece){
      movePieceToCell(other, currentCell);
    }
    movePieceToCell(piece, targetCell);
  }

  // Mouse events
  piece.addEventListener("mousedown", e => {
    e.preventDefault();
    onStart(e.clientX, e.clientY);
  });
  document.addEventListener("mousemove", e => {
    if(!dragging) return;
    onMove(e.clientX, e.clientY);
  });
  document.addEventListener("mouseup", e => {
    if(!dragging) return;
    onEnd(e.clientX, e.clientY);
  });

  // Touch events
  piece.addEventListener("touchstart", e => {
    e.preventDefault();
    const t = e.touches[0];
    onStart(t.clientX, t.clientY);
  }, {passive: false});

  document.addEventListener("touchmove", e => {
    if(!dragging) return;
    e.preventDefault();
    const t = e.touches[0];
    onMove(t.clientX, t.clientY);
  }, {passive: false});

  document.addEventListener("touchend", e => {
    if(!dragging) return;
    const t = e.changedTouches[0];
    onEnd(t.clientX, t.clientY);
  });
}

function tryStartWithGrid(n){
  if(!originalImg) return;
  gridSize = n;
  computeBoardSize();
  pendingImageSrc = centerCropToBoard(originalImg);
  initPuzzle(pendingImageSrc);
}

function isSolved(){
  for(const p of pieces){
    if(parseInt(p.dataset.cell, 10) !== parseInt(p.dataset.correct, 10)) return false;
  }
  return true;
}

function autoHintStep(){
  if(!pieces.length) return;
  if(isSolved()){ stopAutoHint(); return; }
  const wrong = pieces.filter(p => parseInt(p.dataset.cell, 10) !== parseInt(p.dataset.correct, 10));
  if(!wrong.length){ stopAutoHint(); return; }

  const piece = wrong[Math.floor(Math.random() * wrong.length)];
  const correctCell = parseInt(piece.dataset.correct, 10);
  const currentCell = parseInt(piece.dataset.cell, 10);
  if(currentCell === correctCell) return;

  const other = pieces.find(p => parseInt(p.dataset.cell, 10) === correctCell);
  if(other && other !== piece) movePieceToCell(other, currentCell);
  movePieceToCell(piece, correctCell);
}

function startAutoHint(){
  if(hintTimer) return;
  hintTimer = setInterval(autoHintStep, HINT_INTERVAL_MS);
  btnHint.classList.add("active");
}
function stopAutoHint(){
  if(!hintTimer) return;
  clearInterval(hintTimer);
  hintTimer = null;
  btnHint.classList.remove("active");
}
function toggleAutoHint(){
  if(hintTimer) stopAutoHint();
  else startAutoHint();
}

function loadImageFile(file){
  if(!file || !file.type.startsWith("image")) return;
  stopAutoHint();
  gridSize = 4;
  updateGridButtonSelection();
  clearBoardPieces();
  pendingImageSrc = null;
  originalImg = null;
  hidePreview();
  hideInstruction();

  const reader = new FileReader();
  reader.onload = ev => {
    const img = new Image();
    img.onload = () => {
      originalImg = img;
      computeBoardSize();
      pendingImageSrc = centerCropToBoard(img);
      showPreview(pendingImageSrc);
    };
    img.src = ev.target.result;
  };
  reader.readAsDataURL(file);
}

function updateGridButtonSelection(){
  gridButtons.forEach(b => {
    b.classList.toggle("selected", parseInt(b.dataset.grid, 10) === gridSize);
  });
}

// --- UI event bindings ---

fileInput.addEventListener("change", e => {
  const file = e.target.files[0];
  if(file) loadImageFile(file);
  fileInput.value = "";
});

gridButtons.forEach(b => {
  b.addEventListener("click", () => {
    const n = parseInt(b.dataset.grid, 10);
    gridSize = n;
    updateGridButtonSelection();
    if(originalImg){
      computeBoardSize();
      pendingImageSrc = centerCropToBoard(originalImg);
      initPuzzle(pendingImageSrc);
    }
  });
});

btnPreview.addEventListener("click", () => {
  if(!pendingImageSrc) return;
  const showing = preview.style.display !== "none";
  if(showing){
    hidePreview();
    for(const p of pieces) p.style.visibility = "visible";
  } else {
    showPreview(pendingImageSrc);
    for(const p of pieces) p.style.visibility = "hidden";
  }
});

btnShuffle.addEventListener("click", () => {
  if(!pendingImageSrc || !pieces.length) return;
  hidePreview();
  initPuzzle(pendingImageSrc);
});

btnHint.addEventListener("click", () => {
  toggleAutoHint();
});

// --- Keyboard shortcuts (desktop) ---
document.addEventListener("keydown", e => {
  const k = e.key;

  if(k === "0"){
    btnPreview.click();
    return;
  }
  if(k === "r" || k === "R"){
    btnShuffle.click();
    return;
  }
  if(k === "h" || k === "H"){
    toggleAutoHint();
    return;
  }
  if(k.length === 1 && k >= "1" && k <= "9"){
    tryStartWithGrid(parseInt(k, 10));
    updateGridButtonSelection();
  }
});

// --- Desktop drag & drop ---
document.addEventListener("dragover", e => { e.preventDefault(); });
document.addEventListener("drop", e => {
  e.preventDefault();
  const file = e.dataTransfer.files[0];
  if(file) loadImageFile(file);
});

// --- Resize ---
window.addEventListener("resize", () => {
  if(originalImg){
    computeBoardSize();
    pendingImageSrc = centerCropToBoard(originalImg);
    if(pieces.length){
      initPuzzle(pendingImageSrc);
    } else {
      showPreview(pendingImageSrc);
    }
  } else {
    computeBoardSize();
  }
});

computeBoardSize();
</script>

</body>
</html>
